version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: ig-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: instagram
      POSTGRES_PASSWORD: instagram123
      POSTGRES_DB: instagram_dms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ig-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ../server
      dockerfile: ../docker/server.Dockerfile
    env_file:
      - ../server/.env
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../server:/app
      - /app/node_modules

  client:
    build:
      context: ../client
      dockerfile: ../docker/client.Dockerfile
    env_file:
      - ../client/.env
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ../client:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
